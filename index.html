<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}
body{
background-color:#eaeded;
color:#0f1111;
}
.navbar{
background-color:#131921;
height:60px;
display:flex;
align-items:center;
padding:0 15px;
}
.logo{
color:white;
font-size:24px;
font-weight:bold;
}
.search-bar{
display:flex;
flex:1;
margin:0 40px;
height:40px;
}
.search-input{
width:100%;
border:none;
padding-left:10px;
}
.search-button{
background:#febd69;
border:none;
width:45px;
cursor:pointer;
}
.nav-cart{
display:flex;
color:white;
align-items:center;
}
.cart-count{
background:#f08804;
border-radius:10px;
width:20px;
height:20px;
display:flex;
align-items:center;
justify-content:center;
margin-left:5px;
font-size:12px;
}
.product-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin:20px;
}
.product-card{
background:white;
padding:20px;
text-align:center;
border-radius:5px;
}
.product-image img{
max-width:100%;
height:150px;
object-fit:cover;
}
.product-title{
font-size:18px;
margin:10px 0;
}
.product-price{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}
.buy-btn{
background:#ffd814;
border:none;
padding:8px;
width:100%;
cursor:pointer;
border-radius:4px;
font-weight:bold;
}
.buy-btn:hover{
background:#f7ca00;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="logo">amazon</div>

<div class="search-bar">
<input type="text" class="search-input" placeholder="Search Amazon">
<button class="search-button">🔍</button>
</div>

<div class="nav-cart">
🛒
<div class="cart-count">0</div>
</div>
</nav>

<!-- BANNER CAROUSEL -->
<div id="amazonBanner" class="carousel slide mt-2" data-bs-ride="carousel">
<div class="carousel-indicators">
<button type="button" data-bs-target="#amazonBanner" data-bs-slide-to="0" class="active"></button>
<button type="button" data-bs-target="#amazonBanner" data-bs-slide-to="1"></button>
<button type="button" data-bs-target="#amazonBanner" data-bs-slide-to="2"></button>
</div>

<div class="carousel-inner">
<div class="carousel-item active">
<img src="https://images.unsplash.com/photo-1607082349566-187342175e2f" class="d-block w-100" height="350">
</div>
<div class="carousel-item">
<img src="https://fdn2.gsmarena.com/vv/pics/vivo/vivo-x-fold2-1.jpg" class="d-block w-100" height="350">
</div>
<div class="carousel-item">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9" class="d-block w-100" height="350">
</div>
</div>

<button class="carousel-control-prev" type="button" data-bs-target="#amazonBanner" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#amazonBanner" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>
</div>

<!-- PRODUCTS -->
<div class="product-row">

<div class="product-card">
<div class="product-image">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
</div>
<div class="product-title">Samsung S25 Ultra</div>
<div class="product-price">$799.99</div>
<button class="buy-btn">Add to Cart</button>
</div>

<div class="product-card">
<div class="product-image">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
</div>
<div class="product-title">iPhone 17</div>
<div class="product-price">$699.99</div>
<button class="buy-btn">Add to Cart</button>
</div>

<div class="product-card">
<div class="product-image">
<img src="https://fdn2.gsmarena.com/vv/pics/vivo/vivo-x-fold2-1.jpg">
</div>
<div class="product-title">Vivo Fold</div>
<div class="product-price">$599.99</div>
<button class="buy-btn">Add to Cart</button>
</div>

<div class="product-card">
<div class="product-image">
<img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796">
</div>
<div class="product-title">Realme Phone</div>
<div class="product-price">$399.99</div>
<button class="buy-btn">Add to Cart</button>
</div>

</div>

<!-- BUY FORM MODAL -->
<div class="modal fade" id="buyModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">Enter Your Details</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<form id="buyForm">
<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" id="customerName" required>
</div>
<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" id="customerEmail" required>
</div>
<div class="mb-3">
<label>Phone Number</label>
<input type="tel" class="form-control" id="customerPhone" required>
</div>
<button type="submit" class="btn btn-warning w-100">Confirm Purchase</button>
</form>
</div>
</div>
</div>
</div>

<script>
let cartCount = 0;
let selectedProduct = "";

const cartDisplay = document.querySelector(".cart-count");
const buttons = document.querySelectorAll(".buy-btn");

buttons.forEach(button => {
button.addEventListener("click", function(){
selectedProduct = this.parentElement.querySelector(".product-title").innerText;
let modal = new bootstrap.Modal(document.getElementById('buyModal'));
modal.show();
});
});

document.getElementById("buyForm").addEventListener("submit", function(e){
e.preventDefault();
let name = document.getElementById("customerName").value;
let email = document.getElementById("customerEmail").value;
let phone = document.getElementById("customerPhone").value;
cartCount++;
cartDisplay.textContent = cartCount;
alert(
"Order Confirmed!\n\n"+
"Product: "+selectedProduct+
"\nName: "+name+
"\nEmail: "+email+
"\nPhone: "+phone
);
let modal = bootstrap.Modal.getInstance(document.getElementById('buyModal'));
modal.hide();
this.reset();
});

// SEARCH FUNCTION
const searchInput = document.querySelector(".search-input");
const searchButton = document.querySelector(".search-button");

searchButton.addEventListener("click", searchProduct);
searchInput.addEventListener("keyup", function(e){
if(e.key === "Enter"){ searchProduct(); }
});

function searchProduct(){
let filter = searchInput.value.toLowerCase();
let products = document.querySelectorAll(".product-card");
products.forEach(product => {
let title = product.querySelector(".product-title").innerText.toLowerCase();
product.style.display = title.includes(filter) ? "block" : "none";
});
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
